<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f3"/>
      <stop offset="100%" style="stop-color:#e8efeb"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Bottle body -->
  <rect x="310" y="180" width="180" height="280" rx="30" fill="white" stroke="#659287" stroke-width="2"/>
  <!-- Bottle neck -->
  <rect x="350" y="120" width="100" height="70" rx="15" fill="white" stroke="#659287" stroke-width="2"/>
  <!-- Cap -->
  <rect x="340" y="90" width="120" height="40" rx="12" fill="#659287"/>
  <!-- Label -->
  <rect x="330" y="220" width="140" height="110" rx="12" fill="#f9fafb" stroke="#659287" stroke-width="1.5"/>
  <text x="400" y="260" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#659287" text-anchor="middle">YOUR</text>
  <text x="400" y="285" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#659287" text-anchor="middle">BRAND</text>
  <text x="400" y="310" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">Skincare</text>
</svg>
