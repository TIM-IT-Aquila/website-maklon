<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B9CEAC"/>
      <stop offset="50%" style="stop-color:#a8c49a"/>
      <stop offset="100%" style="stop-color:#8fb87d"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg1)"/>
  <!-- Abstract organic shapes -->
  <circle cx="200" cy="150" r="300" fill="url(#glow1)"/>
  <circle cx="1400" cy="700" r="350" fill="url(#glow1)"/>
  <ellipse cx="800" cy="450" rx="600" ry="400" fill="#ffffff" opacity="0.04"/>
  <!-- Floating orbs -->
  <circle cx="1200" cy="200" r="80" fill="#ffffff" opacity="0.08"/>
  <circle cx="1300" cy="280" r="40" fill="#ffffff" opacity="0.06"/>
  <circle cx="350" cy="650" r="100" fill="#ffffff" opacity="0.06"/>
  <circle cx="450" cy="720" r="50" fill="#ffffff" opacity="0.05"/>
</svg>
