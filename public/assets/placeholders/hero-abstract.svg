<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8fb87d"/>
      <stop offset="50%" style="stop-color:#a8c49a"/>
      <stop offset="100%" style="stop-color:#c5dbb8"/>
    </linearGradient>
    <radialGradient id="radial1" cx="30%" cy="70%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg2)"/>
  <!-- Diagonal sweep -->
  <polygon points="0,900 600,0 1000,0 200,900" fill="#ffffff" opacity="0.03"/>
  <polygon points="800,900 1200,0 1600,0 1100,900" fill="#ffffff" opacity="0.02"/>
  <!-- Decorative rings -->
  <circle cx="1400" cy="150" r="200" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>
  <circle cx="1400" cy="150" r="150" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.05"/>
  <circle cx="300" cy="750" r="180" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.06"/>
  <!-- Sparkle dots -->
  <circle cx="200" cy="300" r="4" fill="#ffffff" opacity="0.2"/>
  <circle cx="450" cy="200" r="3" fill="#ffffff" opacity="0.15"/>
  <circle cx="1100" cy="400" r="5" fill="#ffffff" opacity="0.2"/>
  <circle cx="1350" cy="550" r="3" fill="#ffffff" opacity="0.15"/>
  <circle cx="750" cy="150" r="4" fill="#ffffff" opacity="0.15"/>
</svg>
