<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#d4e5c8"/>
      <stop offset="50%" style="stop-color:#c5dbb8"/>
      <stop offset="100%" style="stop-color:#b2cea2"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg3)"/>
  <!-- Top light sweep -->
  <rect width="1600" height="300" fill="url(#shine)"/>
  <!-- Subtle leaf-like shapes -->
  <path d="M0,550 Q200,400 400,600 Q250,700 0,650 Z" fill="#ffffff" opacity="0.04"/>
  <path d="M1200,200 Q1400,100 1600,250 Q1500,350 1300,300 Z" fill="#ffffff" opacity="0.04"/>
  <path d="M1000,650 Q1200,500 1400,700 Q1300,800 1100,750 Z" fill="#ffffff" opacity="0.03"/>
  <!-- Floating elements -->
  <circle cx="150" cy="450" r="6" fill="#ffffff" opacity="0.15"/>
  <circle cx="350" cy="350" r="4" fill="#ffffff" opacity="0.12"/>
  <circle cx="1250" cy="350" r="5" fill="#ffffff" opacity="0.12"/>
  <circle cx="1450" cy="500" r="7" fill="#ffffff" opacity="0.15"/>
  <circle cx="900" cy="200" r="4" fill="#ffffff" opacity="0.1"/>
  <circle cx="600" cy="700" r="5" fill="#ffffff" opacity="0.1"/>
</svg>
