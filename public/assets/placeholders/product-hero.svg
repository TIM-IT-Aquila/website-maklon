<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f0ec"/>
      <stop offset="50%" style="stop-color:#f5faf7"/>
      <stop offset="100%" style="stop-color:#e0ece5"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <!-- Center product card -->
  <rect x="600" y="100" width="400" height="600" rx="30" fill="white" stroke="#659287" stroke-width="2.5"/>
  <rect x="680" y="160" width="240" height="120" rx="16" fill="white" stroke="#659287" stroke-width="1.5"/>
  <text x="800" y="210" font-family="Arial,sans-serif" font-size="24" font-weight="800" fill="#659287" text-anchor="middle">YOUR BRAND</text>
  <text x="800" y="245" font-family="Arial,sans-serif" font-size="14" fill="#888" text-anchor="middle">Premium Skincare</text>
  <line x1="720" y1="265" x2="880" y2="265" stroke="#659287" stroke-width="1" opacity="0.2"/>
  <!-- Decorative circles -->
  <circle cx="550" cy="200" r="80" fill="#659287" opacity="0.05"/>
  <circle cx="1050" cy="700" r="120" fill="#659287" opacity="0.05"/>
  <circle cx="500" cy="750" r="60" fill="#659287" opacity="0.05"/>
</svg>
